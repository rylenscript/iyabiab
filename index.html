<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rylen ❤️ Khloe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
  <h1>Rylen ❤️ Khloe</h1>
  <p>Instagram Chat Memories</p>
</div>
  
<div id="chat"></div>

<script>
fetch('./message1.html')
  .then(res => res.text())
  .then(html => {

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const messages = doc.querySelectorAll('div.pam');
    const chat = document.getElementById('chat');

    const map = new Map();

    function cleanText(text = "") {
      return text
        .replace("❤Khloe", "")
        .replace("❤Rylen", "")
        .replace("(edited)", "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isSystemMessage(text = "") {
      const t = text.toLowerCase();
      return (
        t.includes("liked a message") ||
        t.includes("reacted") ||
        t.includes("reacted ❤️ to your message")
      );
    }

    messages.forEach(msg => {

      const sender = msg.querySelector('h2')?.innerText?.trim();
      const time = msg.querySelector('div._3-94._a6-o')?.innerText?.trim();
      const textBlock = msg.querySelector('div._a6-p');

      if (!sender || !time) return;

      let rawText = textBlock ? textBlock.innerText.trim() : "";

      if (isSystemMessage(rawText)) return;

      const isEdited = rawText.includes("(edited)");

      const text = cleanText(rawText);

      const key = sender + "|" + time;

      const existing = map.get(key);

      const data = { sender, time, text, isEdited };

      if (!existing) {
        map.set(key, data);
      } else {
        // keep edited version if duplicate exists
        if (isEdited && !existing.isEdited) {
          map.set(key, data);
        }
      }
    });

    map.forEach(({ sender, time, text, isEdited }) => {

      const bubble = document.createElement('div');
      bubble.className = sender === 'Rylen' ? 'message you' : 'message her';

      bubble.innerHTML = `
        <div class="name">${sender}</div>
        ${text ? `<div class="bubble">${text}</div>` : ''}
        <div class="meta">
          ${isEdited ? `<span class="edited">edited</span>` : ''}
        </div>
        <div class="time">${time}</div>
      `;

      chat.appendChild(bubble);
    });

  });
</script>
</body>
</html>
