<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rylen ❤️ Khloe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
  <h1>Rylen ❤️ Khloe</h1>
  <p>Instagram Memories</p>
</div>
  
<div id="chat"></div>

<script>
fetch('./message1.html')
  .then(res => res.text())
  .then(html => {

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const messages = doc.querySelectorAll('div.pam');
    const chat = document.getElementById('chat');

    messages.forEach(msg => {

      const sender = msg.querySelector('h2')?.innerText?.trim();
      const time = msg.querySelector('div._3-94._a6-o')?.innerText?.trim();

      if (!sender || !time) return;

      const textBlock = msg.querySelector('div._a6-p');
      let text = textBlock ? textBlock.innerText.trim() : '';

      let isEdited = false;
      let isLiked = false;

      // detect edited
      if (text.toLowerCase().includes('(edited)')) {
        isEdited = true;
        text = text.replace('(edited)', '').trim();
      }

      // detect "liked a message"
      if (text.toLowerCase().includes('liked a message')) {
        isLiked = true;
        text = ''; // remove original system message completely
      }

      const bubble = document.createElement('div');
      bubble.className = sender === 'Rylen' ? 'message you' : 'message her';

      let meta = '';

      if (isEdited) {
        meta += `<span class="edited">edited</span>`;
      }

      // build message
      bubble.innerHTML = `
        <div class="name">${sender}</div>

        ${text ? `<div class="bubble">${text}</div>` : ''}

        ${meta ? `<div class="meta">${meta}</div>` : ''}

        <div class="time">${time}</div>
      `;

      chat.appendChild(bubble);

      // FIX 1: liked message becomes a pink indicator BELOW the message
      if (isLiked) {
        const like = document.createElement('div');
        like.className = 'like-below';
        like.innerText = '❤ liked';

        chat.appendChild(like);
      }

    });

  });
</script>
</body>
</html>
