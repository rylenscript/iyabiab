<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rylen ❤️ Khloe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
  <h1>Rylen ❤️ Khloe</h1>
  <p>Instagram Memories</p>
</div>
  
<div class="search-wrap">
  <input id="search" type="text" placeholder="Search messages...">
</div>
  
<div id="chat"></div>

<script>
fetch('./message1.html')
  .then(res => res.text())
  .then(html => {

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const messages = doc.querySelectorAll('div.pam');
    const chat = document.getElementById('chat');

    function createMessage(sender, time, text, metaHTML, mediaHTML) {

      const el = document.createElement('div');
      el.className = sender === 'Rylen' ? 'message you' : 'message her';

      el.innerHTML = `
        <div class="name">${sender}</div>
        ${mediaHTML || ''}
        ${text ? `<div class="bubble">${text}</div>` : ''}
        ${metaHTML ? `<div class="meta">${metaHTML}</div>` : ''}
        <div class="time">${time}</div>
      `;

      return el;
    }

    messages.forEach(msg => {

      const sender = msg.querySelector('h2')?.innerText?.trim();
      const time = msg.querySelector('div._3-94._a6-o')?.innerText?.trim();

      if (!sender || !time) return;

      let text = '';
      let meta = '';
      let media = '';

      const content = msg.querySelector('div._a6-p');
      if (content) {

        text = content.innerText.trim();

        // LIKED MESSAGE
        if (text.toLowerCase().includes('liked a message')) {
          meta += `<span class="liked">❤ liked</span>`;
        }

        // EDITED MESSAGE
        if (text.toLowerCase().includes('(edited)')) {
          meta += `<span class="edited">edited</span>`;
          text = text.replace('(edited)', '').trim();
        }

        // IMAGE / MEDIA HANDLING
        const imgs = content.querySelectorAll('img');
        imgs.forEach(img => {
          media += `<img src="${img.src}" class="media-img">`;
        });

        // AUDIO HANDLING (voice notes)
        const audio = content.querySelectorAll('audio');
        audio.forEach(a => {
          media += `<audio controls src="${a.src}"></audio>`;
        });
      }

      chat.appendChild(createMessage(sender, time, text, meta, media));

    });

    // AUTO SCROLL LIKE INSTAGRAM
    setTimeout(() => {
      chat.scrollTop = chat.scrollHeight;
    }, 200);
  });
  const searchInput = document.getElementById('search');

searchInput.addEventListener('input', function () {
  const value = this.value.toLowerCase();
  const messages = document.querySelectorAll('.message');

  messages.forEach(msg => {
    const text = msg.innerText.toLowerCase();
    msg.style.display = text.includes(value) ? 'flex' : 'none';
  });
    });
</script>

</body>
</html>
