<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rylen ❤️ Khloe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
  <h1>Rylen ❤️ Khloe</h1>
  <p>Instagram Memories</p>
</div>
  
<div id="chat"></div>

<script>
fetch('./message1.html')
  .then(res => res.text())
  .then(html => {

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const messages = doc.querySelectorAll('div.pam');

    const chat = document.getElementById('chat');

    messages.forEach(msg => {

      const sender = msg.querySelector('h2')?.innerText?.trim();
      const time = msg.querySelector('div._3-94._a6-o')?.innerText?.trim();

      if (!sender || !time) return;

      const textBlock = msg.querySelector('div._a6-p');
      let text = '';
      let isLiked = false;
      let isEdited = false;

      if (textBlock) {
        text = textBlock.innerText.trim();

        if (text.toLowerCase().includes('liked a message')) {
          isLiked = true;
        }

        if (text.toLowerCase().includes('(edited)')) {
          isEdited = true;
          text = text.replace('(edited)', '').trim();
        }
      }

      const bubble = document.createElement('div');
      bubble.className = sender === 'Rylen' ? 'message you' : 'message her';

      let meta = '';

      if (isEdited) meta += `<span class="edited">edited</span>`;
      if (isLiked) meta += `<span class="liked">❤ liked</span>`;

      bubble.innerHTML = `
        <div class="name">${sender}</div>

        ${text ? `<div class="bubble">${text}</div>` : ''}

        ${meta ? `<div class="meta">${meta}</div>` : ''}

        <div class="time">${time}</div>
      `;

      chat.appendChild(bubble);

    });

  });
</script>
</body>
</html>
