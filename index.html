<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rylen ❤️ Khloe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
  <h1>Rylen ❤️ Khloe</h1>
  <p>Instagram Chat Memories</p>
</div>
  
<div id="chat"></div>

<script>
fetch('message1.html')
  .then(res => res.text())
  .then(html => {

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const messages = doc.querySelectorAll('.pam');
    const chat = document.getElementById('chat');

    function clean(text = "") {
      return text
        .replace(/\(edited\)/g, '')
        .replace(/❤Khloe|❤Rylen/g, '')
        .trim();
    }

    function systemMessage(text = "") {
      const t = text.toLowerCase();

      return (
        t.includes('liked a message') ||
        t.includes('reacted') ||
        t.includes('sent an attachment')
      );
    }

    messages.forEach(msg => {

      const sender =
        msg.querySelector('h2')?.innerText?.trim();

      const time =
        msg.querySelector('div._3-94._a6-o')
          ?.innerText?.trim();

      const textElement =
        msg.querySelector('div._a6-p');

      if (!sender || !time || !textElement) return;

      const rawText = textElement.innerText.trim();

      if (systemMessage(rawText)) return;

      const text = clean(rawText);

      const isYou = sender === 'Rylen';

      const bubble = document.createElement('div');

      bubble.className =
        `message ${isYou ? 'you' : 'her'}`;

      bubble.innerHTML = `
        <div class="name">${sender}</div>

        <div class="bubble">
          ${text}
        </div>

        <div class="time">${time}</div>
      `;

      chat.appendChild(bubble);
    });

  });
</script>
</body>
</html>
