<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕊️❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="loginScreen">
  <div class="login-box">
    <h2>K&R Memories</h2>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Enter</button>
    <p id="error"></p>
  </div>
</div>

<div id="siteContent" style="display:none;">
<div class="top">
  <h1>Khloe ❤️ Rylen</h1>
  <p>Instagram Messages</p>
</div>
  <div class="search-box">
  <input id="searchInput" type="text" placeholder="Search messages...">
</div>
<div id="chat"></div>

<script>
let allMessages = [];

fetch('./message1.html')
  .then(res => res.text())
  .then(html => {

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const messages = doc.querySelectorAll('div.pam');
    const chat = document.getElementById('chat');

    const map = new Map();

function cleanText(text = "") {

  text = text
    .replace("❤Khloe", "")
    .replace("❤Rylen", "")
    .replace("(edited)", "")
    .replace(/\s+/g, " ")
    .trim();

  // detect instagram reel links
  const reelMatch = text.match(/https?:\/\/(www\.)?instagram\.com\/reel\/[^\s]+/);

  if (reelMatch) {
    return reelMatch[0];
  }

  return text;
}

    function isSystemMessage(text = "") {
      const t = text.toLowerCase();
      return (
        t.includes("liked a message") ||
        t.includes("reacted")
      );
    }

    messages.forEach(msg => {

      const sender = msg.querySelector('h2')?.innerText?.trim();
      const time = msg.querySelector('div._3-94._a6-o')?.innerText?.trim();
      const textBlock = msg.querySelector('div._a6-p');

      if (!sender || !time) return;

      let rawText = textBlock ? textBlock.innerText.trim() : "";

      if (isSystemMessage(rawText)) return;

      const isEdited = rawText.includes("(edited)");
      const text = cleanText(rawText);

      const key = sender + "|" + time;

      const existing = map.get(key);

      const data = { sender, time, text, isEdited };

      if (!existing) {
        map.set(key, data);
      } else {
        if (isEdited && !existing.isEdited) {
          map.set(key, data);
        }
      }
    });

    function render(filter = "") {
      chat.innerHTML = "";

      map.forEach(({ sender, time, text, isEdited }) => {

        if (filter && !text.toLowerCase().includes(filter.toLowerCase()) &&
            !sender.toLowerCase().includes(filter.toLowerCase())) {
          return;
        }

        const bubble = document.createElement('div');
        bubble.className = sender === 'Rylen' ? 'message you' : 'message her';

        bubble.innerHTML = `
          <div class="name">${sender}</div>
          ${text ? `<div class="bubble">${text}</div>` : ''}
          <div class="meta">
            ${isEdited ? `<span class="edited">edited</span>` : ''}
          </div>
          <div class="time">${time}</div>
        `;

        chat.appendChild(bubble);
      });
    }

    render();

    document.getElementById("searchInput").addEventListener("input", (e) => {
      render(e.target.value);
    });

  });
</script>
</div>

<script>
function checkPassword() {

  const password = document.getElementById("passwordInput").value;

  if(password === "iloveyou") {

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("siteContent").style.display = "block";

  } else {

    document.getElementById("error").innerText = "Wrong password";

  }
}
</script>
</body>
</html>
